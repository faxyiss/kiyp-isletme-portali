services:

  # ── 1. Veritabanı ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: kiyp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123Baran
      MYSQL_DATABASE: stok_takip_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kiyp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123Baran"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 2. Backend API ─────────────────────────────────────────────────
  api:
    image: caganipek/stokappapi:latest
    container_name: stok_api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=stok_takip_db;user=root;password=123Baran;AllowPublicKeyRetrieval=True;SSL Mode=None
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kiyp-network

  # ── 3. Frontend ────────────────────────────────────────────────────
  frontend:
    image: caganipek/stok-proje:latest
    container_name: stok-proje
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - kiyp-network

# ── Kalıcı veri ve ağ ──────────────────────────────────────────────
volumes:
  mysql_data:

networks:
  kiyp-network:
    driver: bridge
